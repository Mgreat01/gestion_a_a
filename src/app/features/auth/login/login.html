<div class="w-full max-w-md md:max-w-lg mx-auto">
  <div class="bg-white/90 backdrop-blur-sm bg-opacity-95 rounded-3xl shadow-2xl shadow-indigo-900/10 border border-white/50 overflow-hidden">
    
    <!-- Bande décorative -->
    <div class="h-1.5 w-full bg-gradient-to-r from-indigo-500 via-purple-400 to-indigo-500"></div>
    
    <div class="p-6 sm:p-9">
      <!-- En-tête -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-50 text-indigo-600 shadow-sm mb-4">
          <i class="fas fa-sign-in-alt text-2xl"></i>
        </div>
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-gray-800">
          Content de vous revoir
        </h1>
        <p class="text-gray-500 mt-2 text-base font-medium">
          Connectez-vous à votre compte
        </p>
        <div class="w-12 h-0.5 bg-indigo-200 mx-auto mt-4 rounded-full"></div>
      </div>
      
      <!-- Messages -->
      <div *ngIf="message" class="mb-4 p-3 bg-green-50 text-green-700 rounded-xl text-sm font-medium">
        {{ message }}
      </div>
      <div *ngIf="error" class="mb-4 p-3 bg-red-50 text-red-700 rounded-xl text-sm font-medium">
        {{ error }}
      </div>

      <!-- Formulaire -->
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
        <!-- Email -->
        <div class="mb-6">
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">
            Adresse email
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400">
              <i class="fas fa-envelope text-sm"></i>
            </div>
            <input type="email" id="email" name="email"
                   [(ngModel)]="credentials.email" required email
                   placeholder="contact@exemple.com" 
                   class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent input-focus-effect"
                   autocomplete="email">
          </div>
        </div>
        
        <!-- Mot de passe -->
        <div class="mb-5">
          <div class="flex justify-between items-baseline mb-1.5">
            <label for="password" class="block text-sm font-semibold text-gray-700 ml-1">
              Mot de passe
            </label>
            <a href="#" class="text-xs text-indigo-500 hover:text-indigo-700 font-medium">Mot de passe oublié ?</a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400">
              <i class="fas fa-lock text-sm"></i>
            </div>
            <input type="password" id="password" name="password"
                   [(ngModel)]="credentials.password" required minlength="6"
                   placeholder="••••••••" 
                   class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent input-focus-effect"
                   autocomplete="current-password">
          </div>
        </div>
        
        <!-- Bouton -->
        <button type="submit"
                [disabled]="loginForm.invalid"
                class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-bold py-3.5 px-5 rounded-2xl shadow-md shadow-indigo-200 transition-all duration-300 hover:shadow-lg hover:shadow-indigo-300/40 transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2 group disabled:opacity-50 disabled:cursor-not-allowed">
          <span>Se connecter</span>
          <i class="fas fa-arrow-right text-sm group-hover:translate-x-1 transition-transform duration-200"></i>
        </button>
        
        <!-- Lien inscription -->
        <div class="mt-7 text-center text-sm text-gray-500 border-t border-gray-100 pt-5">
          <span>Pas encore de compte ?</span>
          <a routerLink="/register" class="ml-1 font-semibold text-indigo-600 hover:text-indigo-800 transition-colors duration-200 hover:underline underline-offset-2">
            S'inscrire
          </a>
          <div class="flex items-center justify-center gap-2 mt-3 text-xs text-gray-400">
            <i class="fas fa-shield-alt text-indigo-300"></i>
            <span>Connexion sécurisée</span>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
