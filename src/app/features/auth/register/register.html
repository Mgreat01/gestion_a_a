<main class="flex min-h-screen items-center justify-center bg-[#f4f7f5] px-4 py-10">
  <section class="w-full max-w-md rounded-lg border border-[#d9e4df] bg-white p-6 shadow-xl shadow-slate-900/5 sm:p-8">
    <div class="mb-8 text-center">
      <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-lg bg-[#e8f5f3] text-[#0f766e] ring-1 ring-[#b9d9d4]">
        <span class="material-symbols-outlined">person_add</span>
      </div>
      <h1 class="text-3xl font-bold tracking-tight text-[#17201c]">Créer un compte</h1>
      <p class="mt-2 text-sm text-[#65736d]">Rejoignez l'espace de supervision des alertes.</p>
    </div>

    <div *ngIf="message" class="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 p-3 text-sm font-medium text-emerald-800">
      {{ message }}
    </div>
    <div *ngIf="error" class="mb-4 rounded-lg border border-red-200 bg-red-50 p-3 text-sm font-medium text-red-800">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" novalidate class="space-y-5">
      <div>
        <label for="username" class="mb-2 block text-sm font-semibold text-[#24302b]">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" [(ngModel)]="user.username" required placeholder="johndoe_123" autocomplete="username" class="w-full rounded-lg border border-[#cfdcd6] bg-white px-4 py-3 text-[#17201c] outline-none placeholder:text-[#93a19b] focus:border-[#0f766e] focus:ring-2 focus:ring-[#b9d9d4]" />
      </div>

      <div>
        <label for="email" class="mb-2 block text-sm font-semibold text-[#24302b]">Adresse email</label>
        <input type="email" id="email" name="email" [(ngModel)]="user.email" required email placeholder="contact@exemple.com" autocomplete="email" class="w-full rounded-lg border border-[#cfdcd6] bg-white px-4 py-3 text-[#17201c] outline-none placeholder:text-[#93a19b] focus:border-[#0f766e] focus:ring-2 focus:ring-[#b9d9d4]" />
      </div>

      <div>
        <label for="password" class="mb-2 block text-sm font-semibold text-[#24302b]">Mot de passe</label>
        <input type="password" id="password" name="password" [(ngModel)]="user.password" required minlength="6" placeholder="Minimum 6 caractères" autocomplete="new-password" class="w-full rounded-lg border border-[#cfdcd6] bg-white px-4 py-3 text-[#17201c] outline-none placeholder:text-[#93a19b] focus:border-[#0f766e] focus:ring-2 focus:ring-[#b9d9d4]" />
      </div>

      <button type="submit" [disabled]="registerForm.invalid" class="w-full rounded-lg bg-[#0f766e] px-5 py-3 font-semibold text-white shadow-sm transition hover:bg-[#115e59] disabled:opacity-50">
        S'inscrire
      </button>
    </form>

    <p class="mt-6 border-t border-[#e4ebe7] pt-5 text-center text-sm text-[#65736d]">
      Déjà membre ?
      <a routerLink="/login" class="font-semibold text-[#0f766e] hover:text-[#115e59]">Se connecter</a>
    </p>
  </section>
</main>
