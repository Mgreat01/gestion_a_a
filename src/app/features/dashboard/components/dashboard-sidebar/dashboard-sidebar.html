<aside class="hidden h-screen w-72 shrink-0 flex-col border-r border-[#d9e4df] bg-white px-4 py-5 text-[#17201c] lg:flex">
  <div class="mb-7 flex items-center gap-3 px-2">
    <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-[#e8f5f3] text-[#0f766e] ring-1 ring-[#b9d9d4]">
      <span class="material-symbols-outlined">shield_person</span>
    </div>
    <div>
      <p class="text-base font-bold text-[#17201c]">Emergency Nexus</p>
      <p class="text-xs text-[#65736d]">{{ role==='admin' ? 'Centre de commandement' : 'Espace terrain' }}</p>
    </div>
  </div>

  <nav class="flex flex-1 flex-col gap-1.5">
    <button *ngFor="let item of items" type="button" (click)="viewChange.emit(item.key)" class="group flex items-center gap-3 rounded-lg border px-3 py-3 text-left transition" [ngClass]="activeView===item.key ? 'border-[#b9d9d4] bg-[#e8f5f3] text-[#0f766e]' : 'border-transparent text-[#65736d] hover:border-[#d9e4df] hover:bg-[#f8fafc] hover:text-[#17201c]'">
      <span class="flex h-10 w-10 items-center justify-center rounded-lg" [ngClass]="activeView===item.key ? 'bg-white text-[#0f766e]' : 'bg-[#f4f7f5] text-[#65736d]'">
        <span class="material-symbols-outlined text-[22px]">{{item.icon}}</span>
      </span>
      <span>
        <span class="block text-sm font-semibold">{{item.label}}</span>
        <span class="block text-xs text-[#65736d]">{{item.hint}}</span>
      </span>
    </button>
  </nav>

  <div class="rounded-lg border border-[#d9e4df] bg-[#f8fafc] p-4 text-xs leading-5 text-[#65736d]">
    <p class="font-semibold text-[#17201c]">Emergency network</p>
    <p class="mt-2">Supervision temps réel, création d'alertes et coordination terrain.</p>
  </div>
</aside>
