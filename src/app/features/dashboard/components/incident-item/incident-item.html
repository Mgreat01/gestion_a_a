<div class="incident-item" [ngClass]="alert.severity">
  <div class="incident-icon">
    <span class="material-symbols-outlined">
      {{ alert.severity === 'high' ? 'local_fire_department' : alert.severity === 'medium' ? 'warning' : 'medical_services' }}
    </span>
  </div>

  <div class="incident-content">
    <div class="incident-top">
      <p class="incident-title">
        {{ alert.location || ('Incident #' + alert.id) }}
      </p>
      <span class="severity-badge">
        {{ alert.severity }}
      </span>
    </div>

    <p class="incident-meta">
      {{ alert.created_at | date:'short' }}
      •
      {{ alert.status }}
    </p>
  </div>
</div>
