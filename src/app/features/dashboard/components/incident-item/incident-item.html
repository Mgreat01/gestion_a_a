<div class="border border-slate-700 rounded-lg p-3">

  <div class="flex justify-between">

    <span
      class="px-2 py-1 rounded text-xs"
      [class.bg-red-500]="alert.severity === 'high'"
      [class.bg-orange-500]="alert.severity === 'medium'"
      [class.bg-green-500]="alert.severity === 'low'">

      {{ alert.severity }}

    </span>

    <span class="text-xs">
      {{ alert.status }}
    </span>

  </div>

  <p class="mt-3 text-xs text-gray-400">
    {{ alert.created_at | date:'short' }}
  </p>

</div>
