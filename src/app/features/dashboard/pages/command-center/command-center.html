<div class="command-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-profile">
      <div class="avatar">
        <span class="material-symbols-outlined">shield_person</span>
      </div>
      <div>
        <p class="profile-name">Cmdr. Sterling</p>
        <p class="profile-role">Sector 7 Admin</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item active">
        <span class="material-symbols-outlined">dashboard</span>
        <span>Dashboard</span>
      </a>

      <a class="nav-item">
        <span class="material-symbols-outlined">map</span>
        <span>Incident Map</span>
      </a>

      <a class="nav-item">
        <span class="material-symbols-outlined">local_shipping</span>
        <span>Resource Fleet</span>
      </a>

      <a class="nav-item">
        <span class="material-symbols-outlined">groups</span>
        <span>Personnel</span>
      </a>

      <a class="nav-item">
        <span class="material-symbols-outlined">database</span>
        <span>System Logs</span>
      </a>
    </nav>

    <div class="sidebar-brand">RESPONSE</div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <app-header></app-header>

    <section class="dashboard-canvas">
      <!-- fond map -->
      <div class="map-background">
        <app-map-view [alerts]="alerts"></app-map-view>
        <div class="map-overlay"></div>
      </div>

      <!-- contenu flottant -->
      <div class="dashboard-overlay">
        <div class="stats-row">
          <app-stat-card
            title="ACTIVE ALERTS"
            [value]="alerts.length.toString()"
            color="red"
            subtitle="Critical Priority"
            icon="warning">
          </app-stat-card>

          <app-stat-card
            title="FLEET STATUS"
            [value]="'12'"
            color="neutral"
            subtitle="Units deployed"
            icon="emergency">
          </app-stat-card>

          <app-stat-card
            title="NET LOAD"
            [value]="'24%'"
            color="blue"
            subtitle="Network utilization"
            icon="query_stats">
          </app-stat-card>
        </div>

        <div class="overlay-bottom">
          <div class="incident-panel">
            <app-incident-feed [alerts]="alerts"></app-incident-feed>
          </div>
        </div>
      </div>
    </section>

    <app-emergency-button></app-emergency-button>
  </main>
</div>
